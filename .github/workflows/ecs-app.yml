name: Deploy on ECS

on:
  workflow_run:
    workflows: ["Terraform"]
    types:
      - completed
    
permissions:
  id-token: write
  contents: read

env:
  FRONTEND_REPO: frontend-app
  BACKEND_REPO: backend-app
  CLUSTER: 3T-ECS
  SERVICE: 3T-ECS-Service

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
         role-to-assume: arn:aws:iam::160900807677:role/role-for-github-actions
         aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest \
            ./frontend

      - name: Push Frontend Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_REPO }}:latest

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest \
            ./backend

      - name: Push Backend Image
        run: |
          docker push \
            ${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_REPO }}:latest

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -target=module.ecs -auto-approve
        
      - name: ECS Deployment
        run: |
         aws ecs update-service \
         --cluster ${{ env.CLUSTER }} \
         --service ${{ env.SERVICE }} \
         --force-new-deployment
